<!DOCTYPE html>
<html lang="ar" dir="rtl" id="mainHtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MRP Pro - Mohamed Mohamed Ali</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1; /* Indigo Modern */
            --primary-hover: #4f46e5;
            --bg-body: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --danger: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
            --radius: 12px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        [dir="ltr"] { font-family: 'Inter', sans-serif; }
        [dir="rtl"] { font-family: 'Cairo', sans-serif; }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
            transition: all 0.3s ease;
        }

        .app-container {
            max-width: 1500px;
            margin: auto;
        }

        /* Top Navigation Bar */
        .navbar {
            background: var(--card-bg);
            padding: 15px 25px;
            border-radius: var(--radius);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow);
            margin-bottom: 30px;
        }

        .brand h1 { margin: 0; font-size: 22px; color: var(--primary); }
        .brand span { font-size: 13px; color: var(--text-muted); display: block; font-weight: bold; }

        .nav-actions { display: flex; gap: 10px; }

        /* Buttons */
        .btn {
            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-outline { background: transparent; border: 1.5px solid #e5e7eb; color: var(--text-main); }
        .btn-outline:hover { background: #f9fafb; }
        .btn-danger { background: #fee2e2; color: var(--danger); padding: 5px 10px; font-size: 12px; }
        .btn-add { background: #ecfdf5; color: var(--success); font-size: 12px; border: 1px dashed var(--success); }

        /* Stats & Config */
        .config-bar {
            background: white;
            padding: 20px;
            border-radius: var(--radius);
            margin-bottom: 25px;
            box-shadow: var(--shadow);
            display: flex;
            gap: 20px;
            align-items: center;
        }

        /* Machine Card */
        .machine-card {
            background: white;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            margin-bottom: 30px;
            overflow: hidden;
            border: 1px solid #f3f4f6;
        }

        .card-header {
            background: #fafafa;
            padding: 15px 20px;
            border-bottom: 1px solid #f1f5f9;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-header h3 { margin: 0; color: var(--text-main); display: flex; align-items: center; gap: 10px; }

        /* Tables */
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8fafc; color: #475569; padding: 12px; font-size: 12px; text-transform: uppercase; border-bottom: 2px solid #edf2f7; }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; text-align: center; }

        input {
            border: 1.5px solid #e2e8f0;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 13px;
            outline: none;
            transition: 0.2s;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1); }
        input.edit-name { font-weight: bold; color: var(--primary); border: none; background: #f1f5f9; width: 120px; }

        .gap-alert {
            background: #fff1f2;
            color: var(--danger);
            padding: 6px;
            border-radius: 6px;
            font-weight: 700;
            font-size: 11px;
            display: block;
        }

        .covered { color: var(--success); font-weight: bold; font-size: 12px; }

        /* Footer */
        footer {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            font-size: 14px;
        }

        /* Print Optimization */
        @media print {
            .nav-actions, .btn-add, .btn-danger, .config-bar, input { display: none !important; }
            .machine-card { box-shadow: none; border: 1px solid #ccc; }
            body { background: white; padding: 0; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <header class="navbar">
        <div class="brand">
            <h1 id="ui-title">Supply Chain MRP Pro</h1>
            <span id="ui-author">Developed by: Mohamed Mohamed Ali</span>
        </div>
        <div class="nav-actions">
            <button class="btn btn-outline" onclick="toggleLang()">🌐 Language / اللغة</button>
            <button class="btn btn-primary" onclick="saveAll()">💾 <span id="ui-save">حفظ الكل</span></button>
            <button class="btn btn-primary" style="background: var(--warning);" onclick="generateReport()">📊 <span id="ui-report">التقرير</span></button>
        </div>
    </header>

    <section class="config-bar">
        <div>
            <label id="ui-base-date" style="font-weight:600; margin-left: 10px;">📅 تاريخ الجرد الأساسي:</label>
            <input type="date" id="globalBaseDate" onchange="calculateAll()">
        </div>
    </section>

    <main id="mainContent"></main>

    <section id="reportSection" style="display:none; margin-top:30px; background:white; padding:30px; border-radius: var(--radius); box-shadow: var(--shadow);">
        <h2 id="ui-report-title" style="text-align:center; color: var(--danger);">تحليل الفجوات والعجز</h2>
        <div id="reportContainer" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 15px; margin-top:20px;"></div>
        <div style="text-align:center; margin-top:30px;">
            <button class="btn btn-primary" onclick="window.print()">🖨️ طباعة للتقديم للإدارة</button>
        </div>
    </section>

    <footer>
        <hr>
        <p>Copyright &copy; 2026 | Mohamed Mohamed Ali - Supply Chain Manager</p>
    </footer>
</div>

<script>
    // الحالة الافتراضية للبرنامج
    let currentLang = 'ar';
    let machinesData = [
        { nameAr: "خط أفلام PP", nameEn: "PP Films Line", cap: 480, mats: ["HOMO", "CO Polymer", "AS", "AB", "SLIP", "MB white"] },
        { nameAr: "خط أفلام PE", nameEn: "PE Films Line", cap: 240, mats: ["LLDPE M1", "LLDPE M2", "LDPE 0.75", "LDPE 2", "Metallocene", "AS", "AB"] },
        { nameAr: "غطاء CSD", nameEn: "CSD Caps", cap: 150, mats: ["HDPE", "Color MB"] },
        { nameAr: "غطاء WD", nameEn: "WD Caps", cap: 88, mats: ["HDPE", "Color MB"] },
        { nameAr: "شيت PP", nameEn: "PP Sheet", cap: 180, mats: ["Homo", "تكسير PP", "تلك", "Color MB"] },
        { nameAr: "شيت PET", nameEn: "PET Sheet", cap: 200, mats: ["PET", "Flakes", "Crushed"] }
    ];

    const uiLang = {
        ar: {
            title: "نظام إدارة الإمداد MRP",
            author: "بواسطة: محمد محمد علي - مدير إدارة الإمداد والتوريد",
            save: "حفظ البيانات",
            report: "عرض التقرير العاجل",
            baseDate: "📅 تاريخ الجرد الأساسي:",
            cap: "الطاقة",
            mat: "الخامة",
            ratio: "النسبة %",
            daily: "استهلاك يومي",
            stock: "المخزن",
            coverage: "التغطية",
            land: "وصول بري",
            sea: "وصول بحري",
            gap: "عجز",
            ton: "طن",
            day: "يوم",
            addMat: "+ إضافة خامة",
            del: "حذف"
        },
        en: {
            title: "Supply Chain MRP System",
            author: "By: Mohamed Mohamed Ali - Supply Chain Manager",
            save: "Save Data",
            report: "Urgent Report",
            baseDate: "📅 Base Inventory Date:",
            cap: "Capacity",
            mat: "Material",
            ratio: "Ratio %",
            daily: "Daily Use",
            stock: "Stock",
            coverage: "Coverage",
            land: "Land Supply",
            sea: "Sea Supply",
            gap: "Shortage",
            ton: "Ton",
            day: "Day",
            addMat: "+ Add Material",
            del: "Delete"
        }
    };

    // تحميل البيانات أو البدء من الصفر
    function init() {
        const saved = localStorage.getItem('MRP_PRO_V4_DATA');
        if (saved) {
            machinesData = JSON.parse(saved);
        }
        document.getElementById('globalBaseDate').valueAsDate = new Date();
        render();
    }

    function toggleLang() {
        currentLang = currentLang === 'ar' ? 'en' : 'ar';
        document.getElementById('mainHtml').dir = currentLang === 'ar' ? 'rtl' : 'ltr';
        render();
    }

    function render() {
        const l = uiLang[currentLang];
        document.getElementById('ui-title').innerText = l.title;
        document.getElementById('ui-author').innerText = l.author;
        document.getElementById('ui-save').innerText = l.save;
        document.getElementById('ui-report').innerText = l.report;
        document.getElementById('ui-base-date').innerText = l.baseDate;

        const main = document.getElementById('mainContent');
        main.innerHTML = "";

        machinesData.forEach((m, mIdx) => {
            let html = `
                <div class="machine-card">
                    <div class="card-header">
                        <h3>🏭 ${currentLang === 'ar' ? m.nameAr : m.nameEn}</h3>
                        <div>
                            <span>${l.cap}: <input type="number" id="cap-${mIdx}" value="${m.cap}" oninput="updateCap(${mIdx}, this.value)"> ${l.ton}</span>
                            <button class="btn btn-add" onclick="addMaterial(${mIdx})" style="margin-right:15px">${l.addMat}</button>
                        </div>
                    </div>
                    <table>
                        <thead>
                            <tr>
                                <th>${l.mat}</th>
                                <th>${l.ratio}</th>
                                <th>${l.daily}</th>
                                <th>${l.stock}</th>
                                <th>${l.coverage}</th>
                                <th>${l.land} (Qty/Date)</th>
                                <th>${l.gap}</th>
                                <th>${l.sea} (Qty/Date)</th>
                                <th>${l.gap}</th>
                                <th>-</th>
                            </tr>
                        </thead>
                        <tbody id="m-body-${mIdx}">`;
            
            m.mats.forEach((matName, matIdx) => {
                const id = `${mIdx}-${matIdx}`;
                html += `
                    <tr>
                        <td><input type="text" class="edit-name" value="${matName}" oninput="updateMatName(${mIdx}, ${matIdx}, this.value)"></td>
                        <td><input type="number" id="ratio-${id}" value="0" oninput="calculateAll()"></td>
                        <td id="daily-${id}">0</td>
                        <td><input type="number" id="stock-${id}" value="0" oninput="calculateAll()"></td>
                        <td id="stock-res-${id}">-</td>
                        <td>
                            <input type="number" id="lqty-${id}" placeholder="Qty" oninput="calculateAll()">
                            <input type="date" id="ldate-${id}" onchange="calculateAll()">
                        </td>
                        <td id="lgap-${id}">-</td>
                        <td>
                            <input type="number" id="sqty-${id}" placeholder="Qty" oninput="calculateAll()">
                            <input type="date" id="sdate-${id}" onchange="calculateAll()">
                        </td>
                        <td id="sgap-${id}">-</td>
                        <td><button class="btn btn-danger" onclick="removeMaterial(${mIdx}, ${matIdx})">×</button></td>
                    </tr>`;
            });
            html += `</tbody></table></div>`;
            main.innerHTML += html;
        });
        loadInputValues();
        calculateAll();
    }

    // إدارة البيانات
    function updateCap(idx, val) { machinesData[idx].cap = val; }
    function updateMatName(mIdx, matIdx, val) { machinesData[mIdx].mats[matIdx] = val; }
    
    function addMaterial(mIdx) {
        machinesData[mIdx].mats.push(currentLang === 'ar' ? "خامة جديدة" : "New Mat");
        render();
    }

    function removeMaterial(mIdx, matIdx) {
        machinesData[mIdx].mats.splice(matIdx, 1);
        render();
    }

    function calculateAll() {
        const l = uiLang[currentLang];
        const baseDateVal = document.getElementById('globalBaseDate').value;
        if (!baseDateVal) return;
        const baseDate = new Date(baseDateVal);

        machinesData.forEach((m, mIdx) => {
            const dailyCap = (parseFloat(m.cap) || 0) / 30;
            m.mats.forEach((mat, matIdx) => {
                const id = `${mIdx}-${matIdx}`;
                const ratio = (parseFloat(document.getElementById(`ratio-${id}`).value) || 0) / 100;
                const dReq = dailyCap * ratio;
                
                const dailyEl = document.getElementById(`daily-${id}`);
                if(dailyEl) dailyEl.innerText = dReq.toFixed(2);

                if (dReq > 0) {
                    const stock = parseFloat(document.getElementById(`stock-${id}`).value) || 0;
                    const stockDays = Math.floor(stock / dReq);
                    const stockExpiry = new Date(baseDate);
                    stockExpiry.setDate(stockExpiry.getDate() + stockDays);

                    document.getElementById(`stock-res-${id}`).innerHTML = `<b>${stockDays} ${l.day}</b><br><small>${stockExpiry.toLocaleDateString()}</small>`;

                    // فجوة البري
                    const lDate = document.getElementById(`ldate-${id}`).value;
                    const lGapCell = document.getElementById(`lgap-${id}`);
                    if (lDate) {
                        const lArr = new Date(lDate);
                        if (lArr > stockExpiry) {
                            const gapDays = Math.ceil((lArr - stockExpiry) / 86400000);
                            lGapCell.innerHTML = `<span class="gap-alert">${l.gap} ${(gapDays * dReq).toFixed(1)} ${l.ton}</span>`;
                        } else { lGapCell.innerHTML = `<span class="covered">✔</span>`; }
                    }

                    // فجوة البحري (تراكمي)
                    const lQty = parseFloat(document.getElementById(`lqty-${id}`).value) || 0;
                    const totalAfterLand = stock + lQty;
                    const landExpiryDays = Math.floor(totalAfterLand / dReq);
                    const landExpiryDate = new Date(baseDate);
                    landExpiryDate.setDate(landExpiryDate.getDate() + landExpiryDays);

                    const sDate = document.getElementById(`sdate-${id}`).value;
                    const sGapCell = document.getElementById(`sgap-${id}`);
                    if (sDate) {
                        const sArr = new Date(sDate);
                        if (sArr > landExpiryDate) {
                            const gapDays = Math.ceil((sArr - landExpiryDate) / 86400000);
                            sGapCell.innerHTML = `<span class="gap-alert">${l.gap} ${(gapDays * dReq).toFixed(1)} ${l.ton}</span>`;
                        } else { sGapCell.innerHTML = `<span class="covered">✔</span>`; }
                    }
                }
            });
        });
    }

    function saveAll() {
        // حفظ هيكل الماكينات
        localStorage.setItem('MRP_PRO_V4_DATA', JSON.stringify(machinesData));
        
        // حفظ قيم المدخلات (النسب والمخزون)
        const inputs = {};
        document.querySelectorAll('input').forEach(i => { if(i.id) inputs[i.id] = i.value; });
        localStorage.setItem('MRP_PRO_V4_INPUTS', JSON.stringify(inputs));
        
        alert(currentLang === 'ar' ? "✅ تم الحفظ بنجاح يا أستاذ محمد!" : "✅ Saved Successfully!");
    }

    function loadInputValues() {
        const savedInputs = JSON.parse(localStorage.getItem('MRP_PRO_V4_INPUTS'));
        if (savedInputs) {
            Object.keys(savedInputs).forEach(k => {
                const el = document.getElementById(k);
                if (el) el.value = savedInputs[k];
            });
        }
    }

    function generateReport() {
        calculateAll();
        const l = uiLang[currentLang];
        const section = document.getElementById('reportSection');
        const container = document.getElementById('reportContainer');
        section.style.display = 'block';
        container.innerHTML = "";
        
        let alerts = 0;
        machinesData.forEach((m, mIdx) => {
            m.mats.forEach((mat, matIdx) => {
                const id = `${mIdx}-${matIdx}`;
                const lGap = document.getElementById(`lgap-${id}`).innerText;
                const sGap = document.getElementById(`sgap-${id}`).innerText;

                if (lGap.includes(l.gap) || sGap.includes(l.gap)) {
                    alerts++;
                    container.innerHTML += `
                        <div style="border-right: 4px solid red; padding:15px; background:#fff5f5; border-radius:8px;">
                            <strong style="color:var(--primary)">${currentLang === 'ar' ? m.nameAr : m.nameEn}</strong><br>
                            <b>خامة: ${mat}</b><br>
                            <span style="color:red; font-size:13px;">⚠️ ${lGap.includes(l.gap) ? 'عجز بري: '+lGap : ''} | ${sGap.includes(l.gap) ? 'عجز بحري: '+sGap : ''}</span>
                        </div>`;
                }
            });
        });

        if (alerts === 0) container.innerHTML = `<p style="text-align:center; color:var(--success); width:100%">${currentLang === 'ar' ? 'لا يوجد فجوات حالياً' : 'No shortages found'}</p>`;
        window.scrollTo({ top: section.offsetTop, behavior: 'smooth' });
    }

    // التشغيل
    init();
</script>
</body>
</html>
