<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام MRP المطور - حسابات التغطية الدقيقة</title>
    <style>
        :root { --dark: #1e293b; --primary: #3b82f6; --danger: #ef4444; --success: #22c55e; }
        body { font-family: 'Segoe UI', sans-serif; background: #f1f5f9; padding: 20px; }
        .container { max-width: 1600px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e2e8f0; padding-bottom: 20px; margin-bottom: 20px; }
        .config-box { background: #eff6ff; padding: 15px; border-radius: 10px; border: 1px solid #dbeafe; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { background: var(--dark); color: white; padding: 12px; font-size: 13px; }
        td { border: 1px solid #e2e8f0; padding: 10px; text-align: center; font-weight: 500; }
        
        input { border: 1px solid #cbd5e1; padding: 8px; border-radius: 6px; text-align: center; width: 80px; }
        input[type="date"] { width: 140px; }

        .highlight-days { color: var(--primary); font-weight: bold; font-size: 1.1em; }
        .expiry-date { color: #555; background: #f8fafc; padding: 4px; border-radius: 4px; display: block; margin-top: 5px; }
        .gap-alert { background: #fee2e2; color: var(--danger); padding: 8px; border-radius: 6px; border: 1px solid #fecaca; font-weight: bold; }
        
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; transition: 0.2s; }
        .btn-save { background: var(--success); }
        .btn-report { background: #f59e0b; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <h2 style="margin:0; color: var(--dark);">نظام إدارة الإمداد والاحتياجات الزمنية</h2>
            <div class="config-box" style="margin-top:10px;">
                <label>تاريخ بداية الحساب (الجرد): </label>
                <input type="date" id="baseDate" onchange="calculateAll()">
            </div>
        </div>
        <div style="display: flex; gap: 10px;">
            <button class="btn btn-save" onclick="saveData()">💾 حفظ البيانات</button>
            <button class="btn btn-report" onclick="generateReport()">📊 تقرير العجز</button>
        </div>
    </div>

    <div id="content"></div>

    <div id="reportSection" style="display:none; margin-top:30px; padding:20px; border:2px dashed var(--dark); border-radius:10px;">
        <h3 style="color:var(--danger); text-align:center;">🚨 تنبيهات الفجوات الزمنية والكميات المطلوبة</h3>
        <div id="reportContent"></div>
    </div>
</div>

<script>
    const machines = [
        { name: "أفلام PP", cap: 480, mats: ["HOMO", "CO Polymer", "AS", "AB", "SLIP", "MB white"] },
        { name: "أفلام PE", cap: 240, mats: ["LLDPE M1", "LLDPE M2", "LDPE 0.75", "LDPE 2", "Metallocene", "AS", "AB", "SLIP", "PR", "MB White"] },
        { name: "غطاء CSD", cap: 150, mats: ["HDPE", "Color MB"] },
        { name: "غطاء WD", cap: 88, mats: ["HDPE", "Color MB"] },
        { name: "شيت PP", cap: 180, mats: ["Homo", "تكسير PP", "تلك", "Color MB"] },
        { name: "شيت PET", cap: 200, mats: ["PET", "فلاكس", "تكسير"] }
    ];

    document.getElementById('baseDate').valueAsDate = new Date();

    function setup() {
        const board = document.getElementById('content');
        machines.forEach((m, mIdx) => {
            let html = `
                <div style="margin-bottom:40px; border:1px solid #e2e8f0; border-radius:12px; overflow:hidden;">
                    <div style="background:#f1f5f9; padding:15px; display:flex; justify-content:space-between; align-items:center;">
                        <span style="font-size:1.2em; font-weight:bold;">🏭 ${m.name}</span>
                        <span>طاقة شهرية: <input type="number" id="cap-${mIdx}" value="${m.cap}" oninput="calculateAll()"> طن</span>
                    </div>
                    <table>
                        <thead>
                            <tr>
                                <th>الخامة</th>
                                <th>النسبة %</th>
                                <th>استهلاك (يومي)</th>
                                <th>مخزون</th>
                                <th>تغطية المخزون</th>
                                <th>بري (كمية/وصول)</th>
                                <th>فجوة البري</th>
                                <th>بحري (كمية/وصول)</th>
                                <th>فجوة البحري</th>
                            </tr>
                        </thead>
                        <tbody>`;
            m.mats.forEach((mat, matIdx) => {
                const id = `${mIdx}-${matIdx}`;
                html += `
                    <tr>
                        <td style="text-align:right"><b>${mat}</b></td>
                        <td><input type="number" id="ratio-${id}" value="0" oninput="calculateAll()"></td>
                        <td id="daily-${id}">0</td>
                        <td><input type="number" id="stock-${id}" value="0" oninput="calculateAll()"></td>
                        <td id="stock-result-${id}">-</td>
                        <td>
                            <input type="number" id="lqty-${id}" value="0" oninput="calculateAll()">
                            <input type="date" id="ldate-${id}" onchange="calculateAll()">
                        </td>
                        <td id="lgap-${id}">-</td>
                        <td>
                            <input type="number" id="sqty-${id}" value="0" oninput="calculateAll()">
                            <input type="date" id="sdate-${id}" onchange="calculateAll()">
                        </td>
                        <td id="sgap-${id}">-</td>
                    </tr>`;
            });
            html += `</tbody></table></div>`;
            board.innerHTML += html;
        });
        loadData();
    }

    function calculateAll() {
        const baseDate = new Date(document.getElementById('baseDate').value);
        
        machines.forEach((m, mIdx) => {
            const monthlyCap = parseFloat(document.getElementById(`cap-${mIdx}`).value) || 0;
            const dailyCap = monthlyCap / 30;

            m.mats.forEach((mat, matIdx) => {
                const id = `${mIdx}-${matIdx}`;
                const ratio = (parseFloat(document.getElementById(`ratio-${id}`).value) || 0) / 100;
                const dReq = dailyCap * ratio; // الاستهلاك اليومي بناءً على النسبة والماكينة
                
                document.getElementById(`daily-${id}`).innerText = dReq.toFixed(2);

                if (dReq > 0) {
                    const stock = parseFloat(document.getElementById(`stock-${id}`).value) || 0;
                    const lQty = parseFloat(document.getElementById(`lqty-${id}`).value) || 0;
                    const lDate = document.getElementById(`ldate-${id}`).value;
                    const sQty = parseFloat(document.getElementById(`sqty-${id}`).value) || 0;
                    const sDate = document.getElementById(`sdate-${id}`).value;

                    // 1. حساب تغطية المخزون (أيام وتاريخ)
                    const stockDays = Math.floor(stock / dReq);
                    const stockExpiry = new Date(baseDate);
                    stockExpiry.setDate(stockExpiry.getDate() + stockDays);
                    document.getElementById(`stock-result-${id}`).innerHTML = 
                        `<span class="highlight-days">${stockDays} يوم</span>
                         <span class="expiry-date">${stockExpiry.toLocaleDateString('ar-EG')}</span>`;

                    // 2. فجوة البري
                    const lGapCell = document.getElementById(`lgap-${id}`);
                    if (lDate) {
                        const lArr = new Date(lDate);
                        if (lArr > stockExpiry) {
                            const diffDays = (lArr - stockExpiry) / 86400000;
                            lGapCell.innerHTML = `<div class="gap-alert">عجز ${Math.ceil(diffDays * dReq)} طن</div>`;
                        } else { lGapCell.innerHTML = `<b style="color:var(--success)">✅ مغطى</b>`; }
                    }

                    // 3. فجوة البحري (تراكمي)
                    const totalAfterLand = stock + lQty;
                    const landExpiryDays = Math.floor(totalAfterLand / dReq);
                    const landExpiryDate = new Date(baseDate);
                    landExpiryDate.setDate(landExpiryDate.getDate() + landExpiryDays);

                    const sGapCell = document.getElementById(`sgap-${id}`);
                    if (sDate) {
                        const sArr = new Date(sDate);
                        if (sArr > landExpiryDate) {
                            const diffDays = (sArr - landExpiryDate) / 86400000;
                            sGapCell.innerHTML = `<div class="gap-alert">عجز ${Math.ceil(diffDays * dReq)} طن</div>`;
                        } else { sGapCell.innerHTML = `<b style="color:var(--success)">✅ مغطى</b>`; }
                    }
                }
            });
        });
    }

    function generateReport() {
        calculateAll();
        const report = document.getElementById('reportSection');
        const content = document.getElementById('reportContent');
        report.style.display = 'block';
        content.innerHTML = "";

        machines.forEach((m, mIdx) => {
            m.mats.forEach((mat, matIdx) => {
                const id = `${mIdx}-${matIdx}`;
                const lGap = document.getElementById(`lgap-${id}`).innerText;
                const sGap = document.getElementById(`sgap-${id}`).innerText;
                if (lGap.includes("عجز") || sGap.includes("عجز")) {
                    content.innerHTML += `<p>• <b>${m.name} - ${mat}:</b> مطلوب تدبير عجز <b>${lGap.includes("عجز") ? lGap : sGap}</b> لتفادي توقف الإنتاج.</p>`;
                }
            });
        });
        if(content.innerHTML === "") content.innerHTML = "<h3 style='color:var(--success)'>جميع الخامات مغطاة زمنياً بالتعاقدات الحالية.</h3>";
        window.scrollTo(0, document.body.scrollHeight);
    }

    function saveData() {
        const data = {};
        document.querySelectorAll('input').forEach(i => data[i.id] = i.value);
        localStorage.setItem('MRP_V2_DATA', JSON.stringify(data));
        alert("تم الحفظ بنجاح!");
    }

    function loadData() {
        const saved = JSON.parse(localStorage.getItem('MRP_V2_DATA'));
        if (saved) {
            Object.keys(saved).forEach(k => { if(document.getElementById(k)) document.getElementById(k).value = saved[k]; });
            calculateAll();
        }
    }

    setup();
</script>
</body>
</html>
