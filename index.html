<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام محاكاة التدفق الزمني - سوفي باك</title>
    <style>
        :root { --dark: #1a1a2e; --accent: #16213e; --danger: #e94560; --success: #0f3460; --highlight: #00d2ff; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1600px; margin: auto; }
        .card { background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-bottom: 25px; border-right: 8px solid var(--highlight); }
        .card-header { padding: 15px 25px; background: #f8f9fa; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; }
        
        table { width: 100%; border-collapse: collapse; }
        th { background: var(--dark); color: white; padding: 15px; font-size: 13px; }
        td { border: 1px solid #eee; padding: 12px; text-align: center; font-weight: 500; }
        
        input { border: 1px solid #ddd; padding: 8px; border-radius: 6px; text-align: center; width: 85px; background: #fff; transition: 0.3s; }
        input:focus { border-color: var(--highlight); outline: none; box-shadow: 0 0 5px rgba(0,210,255,0.5); }
        
        .gap-alert { background: #ffebeb; color: var(--danger); font-weight: bold; border: 1px solid var(--danger); padding: 5px; border-radius: 4px; animation: blink 2s infinite; }
        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.7;} 100% {opacity: 1;} }

        .btn { padding: 12px 25px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; transition: 0.3s; }
        .btn-save { background: #27ae60; }
        .btn-report { background: #f39c12; }
        
        #finalReport { display: none; background: #fff; padding: 30px; border-radius: 15px; margin-top: 30px; border: 2px solid var(--dark); }
        .report-section { display: grid; grid-columns: 1fr 1fr; gap: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; background: var(--dark); color: white; padding: 20px; border-radius: 15px;">
        <div>
            <h2 style="margin:0">نظام التخطيط الزمني الذكي (Sequential MRP)</h2>
            <p style="margin:5px 0 0 0">تاريخ البدء: <input type="date" id="baseDate" style="width:150px; background: white;" onchange="updateAll()"></p>
        </div>
        <div style="display: flex; gap: 10px;">
            <button class="btn btn-save" onclick="saveToBrowser()">💾 حفظ البيانات</button>
            <button class="btn btn-report" onclick="showReport()">📊 إصدار تقرير الفجوات</button>
        </div>
    </div>

    <div id="machinesBoard"></div>

    <div id="finalReport">
        <h2 style="text-align: center; color: var(--danger);">🚨 تقرير العجز والاحتياجات العاجلة</h2>
        <hr>
        <div id="reportContent" style="line-height: 1.8; font-size: 1.1rem;"></div>
        <hr>
        <button class="btn btn-save" onclick="window.print()">🖨️ طباعة التقرير للعمليات</button>
    </div>
</div>

<script>
    const inventoryDate = document.getElementById('baseDate');
    inventoryDate.valueAsDate = new Date();

    const dataModel = [
        { name: "ماكينة PP", cap: 480, mats: ["HOMO", "CO Polymer", "AS", "AB", "SLIP", "MB white"] },
        { name: "ماكينة PE", cap: 240, mats: ["LLDPE M1", "LLDPE M2", "LDPE 0.75", "LDPE 2", "Metallocene", "AS", "AB", "SLIP", "PR", "MB White"] },
        { name: "ماكينة CSD", cap: 150, mats: ["HDPE", "Color MB"] },
        { name: "ماكينة WD", cap: 88, mats: ["HDPE", "Color MB"] },
        { name: "ماكينة شيت PP", cap: 180, mats: ["Homo", "تكسير PP", "تلك", "Color MB"] },
        { name: "ماكينة شيت PET", cap: 200, mats: ["PET", "فلاكس", "تكسير"] }
    ];

    function buildUI() {
        const board = document.getElementById('machinesBoard');
        dataModel.forEach((m, mIdx) => {
            let html = `
                <div class="card">
                    <div class="card-header">
                        <span style="font-size: 1.2rem; font-weight: bold;">🏢 ${m.name}</span>
                        <span>طاقة شهرية: <input type="number" id="cap-${mIdx}" value="${m.cap}" onchange="updateAll()"> طن</span>
                    </div>
                    <table>
                        <thead>
                            <tr>
                                <th>الخامة</th>
                                <th>نسبة %</th>
                                <th>مخزون</th>
                                <th>تاريخ نفاذه</th>
                                <th>كمية بري</th>
                                <th>وصول بري</th>
                                <th>فجوة البري</th>
                                <th>كمية بحري</th>
                                <th>وصول بحري</th>
                                <th>فجوة البحري</th>
                            </tr>
                        </thead>
                        <tbody>`;
            m.mats.forEach((mat, matIdx) => {
                const id = `${mIdx}-${matIdx}`;
                html += `
                    <tr>
                        <td><b>${mat}</b></td>
                        <td><input type="number" id="ratio-${id}" value="0" onchange="updateAll()"></td>
                        <td><input type="number" id="stock-${id}" value="0" onchange="updateAll()"></td>
                        <td id="expiry-${id}" style="color:blue">-</td>
                        <td><input type="number" id="lqty-${id}" value="0" onchange="updateAll()"></td>
                        <td><input type="date" id="ldate-${id}" onchange="updateAll()"></td>
                        <td id="lgap-${id}">-</td>
                        <td><input type="number" id="sqty-${id}" value="0" onchange="updateAll()"></td>
                        <td><input type="date" id="sdate-${id}" onchange="updateAll()"></td>
                        <td id="sgap-${id}">-</td>
                    </tr>`;
            });
            html += `</tbody></table></div>`;
            board.innerHTML += html;
        });
        loadFromBrowser();
    }

    function updateAll() {
        const start = new Date(inventoryDate.value);
        dataModel.forEach((m, mIdx) => {
            const daily = (parseFloat(document.getElementById(`cap-${mIdx}`).value) || 0) / 30;
            m.mats.forEach((mat, matIdx) => {
                const id = `${mIdx}-${matIdx}`;
                const ratio = (parseFloat(document.getElementById(`ratio-${id}`).value) || 0) / 100;
                const dReq = daily * ratio;

                if (dReq > 0) {
                    const stock = parseFloat(document.getElementById(`stock-${id}`).value) || 0;
                    const lQty = parseFloat(document.getElementById(`lqty-${id}`).value) || 0;
                    const lDate = document.getElementById(`ldate-${id}`).value;
                    const sQty = parseFloat(document.getElementById(`sqty-${id}`).value) || 0;
                    const sDate = document.getElementById(`sdate-${id}`).value;

                    // 1. حساب نفاذ المخزون الحالي
                    let expDate = new Date(start);
                    expDate.setDate(expDate.getDate() + (stock / dReq));
                    document.getElementById(`expiry-${id}`).innerText = expDate.toLocaleDateString('ar-EG');

                    // 2. تحليل الفجوة البرية
                    const lGapCell = document.getElementById(`lgap-${id}`);
                    if (lDate) {
                        const lArr = new Date(lDate);
                        if (lArr > expDate) {
                            const diff = (lArr - expDate) / 86400000;
                            lGapCell.innerHTML = `<div class="gap-alert">عجز ${Math.ceil(diff * dReq)} طن</div>`;
                        } else { lGapCell.innerHTML = "✅ مغطى"; }
                    }

                    // 3. تحليل الفجوة البحرية (بعد البري)
                    const totalAfterL = stock + lQty;
                    let lExpDate = new Date(start);
                    lExpDate.setDate(lExpDate.getDate() + (totalAfterL / dReq));
                    const sGapCell = document.getElementById(`sgap-${id}`);
                    if (sDate) {
                        const sArr = new Date(sDate);
                        if (sArr > lExpDate) {
                            const diff = (sArr - lExpDate) / 86400000;
                            sGapCell.innerHTML = `<div class="gap-alert">عجز ${Math.ceil(diff * dReq)} طن</div>`;
                        } else { sGapCell.innerHTML = "✅ مغطى"; }
                    }
                }
            });
        });
    }

    function showReport() {
        updateAll();
        const report = document.getElementById('finalReport');
        const content = document.getElementById('reportContent');
        report.style.display = 'block';
        content.innerHTML = "";

        dataModel.forEach((m, mIdx) => {
            m.mats.forEach((mat, matIdx) => {
                const id = `${mIdx}-${matIdx}`;
                const lGap = document.getElementById(`lgap-${id}`).innerText;
                const sGap = document.getElementById(`sgap-${id}`).innerText;
                const expiry = document.getElementById(`expiry-${id}`).innerText;

                if (lGap.includes("عجز") || sGap.includes("عجز")) {
                    content.innerHTML += `<p>⚠️ <b>${m.name} [خامة ${mat}]:</b> المخزون الحالي ينتهي يوم <b>${expiry}</b>. يوجد ${lGap.includes("عجز") ? 'فجوة وصول بري' : 'فجوة وصول بحري'} بمقدار <b>${lGap.includes("عجز") ? lGap : sGap}</b>. يجب التحرك فوراً.</p>`;
                }
            });
        });
        if(content.innerHTML == "") content.innerHTML = "<h3 style='color:green'>✅ وضع الإمداد آمن جداً، لا يوجد أي عجز متوقع في التواريخ المحددة.</h3>";
        window.scrollTo(0, document.body.scrollHeight);
    }

    function saveToBrowser() {
        const inputs = document.querySelectorAll('input');
        const db = {};
        inputs.forEach(i => db[i.id] = i.value);
        localStorage.setItem('SofiPack_MRP_DB', JSON.stringify(db));
        alert("تم حفظ جميع البيانات والتواريخ بنجاح!");
    }

    function loadFromBrowser() {
        const db = JSON.parse(localStorage.getItem('SofiPack_MRP_DB'));
        if (db) {
            Object.keys(db).forEach(k => { if(document.getElementById(k)) document.getElementById(k).value = db[k]; });
            updateAll();
        }
    }

    buildUI();
</script>
</body>
</html>
